{% extends "base.html" %}

{% block title %}Login - Home Decor{% endblock %}

{% block content %}
<div class="section">
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <p style="text-align: center; margin-bottom: 20px; color: var(--color-gray);">Sign in to your account</p>
        
        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
        </div>
        
        <div style="margin-top: 20px; padding: 15px; background: var(--color-beige); border-radius: 8px; font-size: 0.9rem;">
            <strong>Demo Accounts:</strong><br>
            Admin: admin@homedecor.com / admin123<br>
            User: user@test.com / test123
        </div>
    </div>
</div>
{% endblock %}
